<!DOCTYPE html>
<html>
<head>

    <title>AI Product Description Generator</title>

    <style>

        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #f5f5f5;
        }

        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 30px;
            width: 600px;
            margin-left: auto;
            margin-right: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <h1>AI Product Description Generator</h1>

    <input id="product" placeholder="Enter product name">

    <button onclick="generate()">Generate</button>

    <div id="result"></div>

    <script>

        async function generate() {

            const product = document.getElementById("product").value;

            document.getElementById("result").innerText = "Generating...";

            const res = await fetch("/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ product })
            });

            const data = await res.json();

            document.getElementById("result").innerText = data.text;

        }

    </script>

</body>
</html>
