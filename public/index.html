<!DOCTYPE html>
<html>

<head>

    <title>AI Product Description Generator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body {
            font-family: Arial;
            margin: 0;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #4a6cf7;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            max-width: 70%;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .user {
            background: #4a6cf7;
            color: white;
            margin-left: auto;
        }

        .ai {
            background: white;
            border: 1px solid #ddd;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #4a6cf7;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

            button:hover {
                background: #3657e0;
            }

        .copy-btn {
            margin-top: 8px;
            font-size: 12px;
            cursor: pointer;
            color: #4a6cf7;
        }

        .loading {
            color: #888;
            font-style: italic;
        }
    </style>

</head>

<body>

    <header>
        AI Product Description Generator
    </header>

    <div class="chat" id="chat"></div>

    <div class="input-area">

        <input id="product" placeholder="Type product name...">

        <button onclick="generate()">Send</button>

    </div>

    <script>

        async function generate() {

            const product = document.getElementById("product").value;

            if (!product) return;

            const chat = document.getElementById("chat");

            const userMsg = document.createElement("div");
            userMsg.className = "message user";
            userMsg.innerText = product;

            chat.appendChild(userMsg);

            const loading = document.createElement("div");
            loading.className = "message ai loading";
            loading.innerText = "AI is writing description...";

            chat.appendChild(loading);

            chat.scrollTop = chat.scrollHeight;

            document.getElementById("product").value = "";

            const res = await fetch("/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ product })
            });

            const data = await res.json();

            loading.remove();

            const aiMsg = document.createElement("div");
            aiMsg.className = "message ai";

            const text = document.createElement("div");
            text.innerText = data.text;

            const copy = document.createElement("div");
            copy.className = "copy-btn";
            copy.innerText = "Copy";

            copy.onclick = () => {
                navigator.clipboard.writeText(data.text);
                copy.innerText = "Copied!";
            };

            aiMsg.appendChild(text);
            aiMsg.appendChild(copy);

            chat.appendChild(aiMsg);

            chat.scrollTop = chat.scrollHeight;

        }

    </script>

</body>

</html>
