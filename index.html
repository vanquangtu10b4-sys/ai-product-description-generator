<!DOCTYPE html>
<html>
<head>
    <title>AI Product Description Generator</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2>AI Product Description Generator</h2>

        <p>Enter a product name</p>

        <input id="product" placeholder="e.g leather jacket">

        <br>

        <button onclick="generate()">Generate</button>

        <p id="result"></p>

    </div>

    <script>

async function generate(){

const product=document.getElementById("product").value

const response=await fetch("/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
product:product
})
})

const data=await response.json()

document.getElementById("result").innerText=data.description

}

    </script>

</body>
</html>
